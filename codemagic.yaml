workflows:
  ios-release:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.unluckyprodigy.homebase
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Run code generation
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Install CocoaPods dependencies
        script: cd ios && pod install --repo-update
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number "com.unluckyprodigy.homebase" || echo 0) + 1)) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  android-release:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Run code generation
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
