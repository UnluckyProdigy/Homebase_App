name: homebase
description: "Home inventory management app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.24.0
  drift_flutter: ^0.2.4
  mobile_scanner: ^7.0.2
  dio: ^5.8.0+1
  workmanager: ^0.9.0
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  permission_handler: ^11.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.24.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  custom_lint:
  riverpod_lint:
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#4CAF50"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
